<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>血圧記録ノート</title>
<style>
  :root{
    --ink:#1c2733;
    --paper:#f7f4ec;
    --line:#d9d2c4;
    --brand:#2f6d63;      /* 深い青緑：診療系の落ち着き */
    --brand-soft:#e4efec;
    --warn:#b4472e;       /* 高値の朱 */
    --warn-soft:#f6e7e2;
    --caution:#c98a1c;    /* 注意の琥珀 */
    --shadow:0 2px 10px rgba(28,39,51,.08);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
    background:var(--paper);color:var(--ink);line-height:1.6;
    -webkit-text-size-adjust:100%;
  }
  header{
    background:var(--brand);color:#fff;padding:18px 20px;
  }
  header h1{margin:0;font-size:1.25rem;letter-spacing:.04em;}
  header .who{opacity:.9;font-size:.85rem;margin-top:2px;}
  .wrap{max-width:920px;margin:0 auto;padding:16px;}
  .card{
    background:#fff;border:1px solid var(--line);border-radius:12px;
    box-shadow:var(--shadow);padding:16px;margin-bottom:16px;
  }
  h2{font-size:1.02rem;margin:0 0 12px;padding-bottom:8px;border-bottom:2px solid var(--brand-soft);}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .field{display:flex;flex-direction:column;gap:4px;}
  .field.full{grid-column:1/-1;}
  label{font-size:.82rem;font-weight:600;color:#4a5560;}
  input,textarea,select{
    font:inherit;padding:10px 12px;border:1px solid var(--line);border-radius:8px;
    background:#fdfcf9;width:100%;
  }
  input:focus,textarea:focus{outline:2px solid var(--brand);border-color:var(--brand);}
  textarea{resize:vertical;min-height:52px;}
  .bp-row{display:flex;align-items:center;gap:8px;}
  .bp-row input{text-align:center;}
  .bp-sep{color:#8a929b;font-weight:700;}
  .unit{font-size:.78rem;color:#8a929b;white-space:nowrap;}
  .btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;}
  button{
    font:inherit;font-weight:600;cursor:pointer;border:none;border-radius:8px;
    padding:11px 18px;transition:.15s;
  }
  .primary{background:var(--brand);color:#fff;}
  .primary:hover{background:#255a52;}
  .ghost{background:#fff;color:var(--brand);border:1px solid var(--brand);}
  .ghost:hover{background:var(--brand-soft);}
  .mini{padding:6px 12px;font-size:.82rem;}
  .toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px;}
  .stats{display:flex;gap:10px;flex-wrap:wrap;}
  .stat{background:var(--brand-soft);border-radius:8px;padding:8px 12px;font-size:.85rem;min-width:96px;}
  .stat b{display:block;font-size:1.15rem;color:var(--brand);}
  table{width:100%;border-collapse:collapse;font-size:.88rem;}
  th,td{padding:8px 6px;text-align:center;border-bottom:1px solid var(--line);}
  th{background:#fafaf6;font-size:.8rem;color:#4a5560;position:sticky;top:0;}
  td.memo{text-align:left;color:#57606a;font-size:.82rem;max-width:180px;word-break:break-word;}
  .tag{display:inline-block;padding:1px 8px;border-radius:20px;font-size:.72rem;font-weight:700;}
  .t-normal{background:var(--brand-soft);color:var(--brand);}
  .t-caution{background:#f7efdb;color:var(--caution);}
  .t-high{background:var(--warn-soft);color:var(--warn);}
  .del{color:var(--warn);background:none;padding:4px 8px;font-size:.8rem;}
  .del:hover{text-decoration:underline;}
  .empty{text-align:center;color:#8a929b;padding:28px 10px;}
  .table-scroll{overflow-x:auto;}
  .note{font-size:.78rem;color:#8a929b;margin-top:8px;}
  @media(max-width:560px){
    .grid{grid-template-columns:1fr;}
    td.memo{max-width:110px;}
  }
  @media print{
    header,.card.input,.toolbar .actions,.del,.note{display:none!important;}
    body{background:#fff;}
    .card{box-shadow:none;border:none;padding:0;}
    th{position:static;}
  }
</style>
</head>
<body>
<header>
  <h1>血圧記録ノート</h1>
  <div class="who">富田祥之さん（64歳）</div>
</header>

<div class="wrap">
  <!-- 入力 -->
  <section class="card input">
    <h2>記録を追加</h2>
    <div class="grid">
      <div class="field">
        <label for="dt">測定日時</label>
        <input type="datetime-local" id="dt">
      </div>
      <div class="field">
        <label>血圧（上／下）</label>
        <div class="bp-row">
          <input type="number" id="sys" inputmode="numeric" placeholder="上" min="50" max="300">
          <span class="bp-sep">/</span>
          <input type="number" id="dia" inputmode="numeric" placeholder="下" min="30" max="200">
          <span class="unit">mmHg</span>
        </div>
      </div>
      <div class="field">
        <label for="pulse">脈拍</label>
        <div class="bp-row">
          <input type="number" id="pulse" inputmode="numeric" placeholder="脈拍" min="30" max="220">
          <span class="unit">拍／分</span>
        </div>
      </div>
      <div class="field">
        <label for="memo">メモ</label>
        <input type="text" id="memo" placeholder="例：起床後・服薬前など">
      </div>
    </div>
    <div class="btns">
      <button class="primary" id="addBtn">記録する</button>
      <button class="ghost" id="nowBtn">今の時刻を入れる</button>
    </div>
    <p class="note">同じ日に何回でも記録できます。データはこの端末内にのみ保存されます。</p>
  </section>

  <!-- 一覧 -->
  <section class="card">
    <div class="toolbar">
      <div class="stats" id="stats"></div>
      <div class="actions btns" style="margin:0">
        <button class="ghost mini" id="csvBtn">CSV出力</button>
        <button class="ghost mini" id="printBtn">印刷 / PDF</button>
      </div>
    </div>
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>測定日時</th><th>血圧</th><th>判定</th><th>脈拍</th><th>メモ</th><th></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <p class="note">判定の目安：正常＝上&lt;130かつ下&lt;80／注意＝上130-139または下80-89／高め＝上140以上または下90以上（家庭血圧の一般的な目安。診断は医師にご相談ください）</p>
  </section>
</div>

<script>
const KEY='bp_records_tomita_v1';
const $=id=>document.getElementById(id);
let records=load();

function load(){try{return JSON.parse(localStorage.getItem(KEY))||[];}catch(e){return[];}}
function save(){localStorage.setItem(KEY,JSON.stringify(records));}

function nowLocal(){
  const d=new Date();d.setMinutes(d.getMinutes()-d.getTimezoneOffset());
  return d.toISOString().slice(0,16);
}
function setNow(){$('dt').value=nowLocal();}

function judge(sys,dia){
  if(sys>=140||dia>=90)return{cls:'t-high',label:'高め'};
  if(sys>=130||dia>=80)return{cls:'t-caution',label:'注意'};
  return{cls:'t-normal',label:'正常'};
}
function fmt(iso){
  const d=new Date(iso);
  const w=['日','月','火','水','木','金','土'][d.getDay()];
  const p=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())}（${w}）${p(d.getHours())}:${p(d.getMinutes())}`;
}

function add(){
  const dt=$('dt').value, sys=+$('sys').value, dia=+$('dia').value,
        pulse=$('pulse').value?+$('pulse').value:null, memo=$('memo').value.trim();
  if(!dt){alert('測定日時を入力してください。');return;}
  if(!sys||!dia){alert('血圧（上・下）を入力してください。');return;}
  records.push({id:Date.now(),dt,sys,dia,pulse,memo});
  save();render();
  $('sys').value='';$('dia').value='';$('pulse').value='';$('memo').value='';
  setNow();
}
function del(id){
  if(!confirm('この記録を削除しますか？'))return;
  records=records.filter(r=>r.id!==id);save();render();
}

function render(){
  const sorted=[...records].sort((a,b)=>new Date(b.dt)-new Date(a.dt));
  const tb=$('tbody');
  if(!sorted.length){
    tb.innerHTML='<tr><td colspan="6" class="empty">まだ記録がありません。上のフォームから追加してください。</td></tr>';
    $('stats').innerHTML='';return;
  }
  tb.innerHTML=sorted.map(r=>{
    const j=judge(r.sys,r.dia);
    return `<tr>
      <td>${fmt(r.dt)}</td>
      <td><b>${r.sys}</b> / ${r.dia}</td>
      <td><span class="tag ${j.cls}">${j.label}</span></td>
      <td>${r.pulse??'—'}</td>
      <td class="memo">${escapeHtml(r.memo||'')}</td>
      <td><button class="del" onclick="del(${r.id})">削除</button></td>
    </tr>`;
  }).join('');
  // 統計
  const n=records.length;
  const avg=k=>Math.round(records.reduce((s,r)=>s+r[k],0)/n);
  const pulses=records.filter(r=>r.pulse).map(r=>r.pulse);
  const avgP=pulses.length?Math.round(pulses.reduce((a,b)=>a+b,0)/pulses.length):'—';
  $('stats').innerHTML=`
    <div class="stat">記録数<b>${n}件</b></div>
    <div class="stat">平均 上<b>${avg('sys')}</b></div>
    <div class="stat">平均 下<b>${avg('dia')}</b></div>
    <div class="stat">平均 脈拍<b>${avgP}</b></div>`;
}
function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function exportCsv(){
  if(!records.length){alert('記録がありません。');return;}
  const sorted=[...records].sort((a,b)=>new Date(a.dt)-new Date(b.dt));
  const head=['測定日時','血圧(上)','血圧(下)','脈拍','判定','メモ'];
  const rows=sorted.map(r=>{
    const j=judge(r.sys,r.dia);
    return [fmt(r.dt),r.sys,r.dia,r.pulse??'',j.label,r.memo??''].map(csvCell).join(',');
  });
  const csv='\uFEFF'+[head.join(','),...rows].join('\r\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='血圧記録_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}
function csvCell(v){v=String(v);return /[",\r\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}

$('addBtn').onclick=add;
$('nowBtn').onclick=setNow;
$('csvBtn').onclick=exportCsv;
$('printBtn').onclick=()=>window.print();
[$('sys'),$('dia'),$('pulse'),$('memo')].forEach(el=>el.addEventListener('keydown',e=>{if(e.key==='Enter')add();}));

setNow();render();
</script>
</body>
</html>
